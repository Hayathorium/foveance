name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow manual runs (e.g. to re-verify the pipeline)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/* }

  publish:
    # Publishes to PyPI using an API token stored in the PYPI_API_TOKEN secret.
    # `skip-existing` makes re-runs safe: a version already on PyPI is skipped, not an error.
    # To switch to token-free Trusted Publishing later, configure a publisher on PyPI and replace
    # the `with:` block below with `permissions: {id-token: write}` (see docs/ SUBMISSION notes).
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
